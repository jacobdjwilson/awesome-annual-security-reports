name: Issue Triage

on:
  issue_comment:
    types: [created]

permissions:
  issues: write
  contents: write

jobs:
  triage:
    runs-on: ubuntu-latest

    # Only run on comments that start with a slash command on discovery issues
    if: |
      startsWith(github.event.comment.body, '/') &&
      contains(github.event.issue.labels.*.name, 'report-suggestion')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install --break-system-packages requests

      - name: Parse triage command
        id: parse
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          # Extract the first word of the comment as the command
          CMD=$(echo "$COMMENT_BODY" | head -1 | awk '{print $1}' | tr '[:upper:]' '[:lower:]')
          # Extract everything after the command as the reason
          REASON=$(echo "$COMMENT_BODY" | head -1 | sed "s|^$CMD *||")

          echo "command=$CMD"           >> $GITHUB_OUTPUT
          echo "reason=$REASON"         >> $GITHUB_OUTPUT
          echo "author=$COMMENT_AUTHOR" >> $GITHUB_OUTPUT
          echo "issue=$ISSUE_NUMBER"    >> $GITHUB_OUTPUT
          echo "title=$ISSUE_TITLE"     >> $GITHUB_OUTPUT

          case "$CMD" in
            /false-positive|/fp)
              echo "outcome=false_positive" >> $GITHUB_OUTPUT
              echo "valid=true"             >> $GITHUB_OUTPUT
              echo "label=false-positive"   >> $GITHUB_OUTPUT
              echo "close=true"             >> $GITHUB_OUTPUT
              ;;
            /duplicate|/dup)
              echo "outcome=duplicate"      >> $GITHUB_OUTPUT
              echo "valid=true"             >> $GITHUB_OUTPUT
              echo "label=duplicate"        >> $GITHUB_OUTPUT
              echo "close=true"             >> $GITHUB_OUTPUT
              ;;
            /mismatch)
              echo "outcome=mismatch"       >> $GITHUB_OUTPUT
              echo "valid=true"             >> $GITHUB_OUTPUT
              echo "label=mismatch"         >> $GITHUB_OUTPUT
              echo "close=true"             >> $GITHUB_OUTPUT
              ;;
            /accept|/true-positive|/tp)
              echo "outcome=true_positive"  >> $GITHUB_OUTPUT
              echo "valid=true"             >> $GITHUB_OUTPUT
              echo "label=accepted"         >> $GITHUB_OUTPUT
              echo "close=false"            >> $GITHUB_OUTPUT
              ;;
            /help)
              echo "valid=help"             >> $GITHUB_OUTPUT
              ;;
            *)
              echo "valid=false"            >> $GITHUB_OUTPUT
              ;;
          esac

      - name: Post help message
        if: steps.parse.outputs.valid == 'help'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ github.event.issue.number }} --body "$(cat << 'EOF'
          ### 🏷️ Triage Commands

          | Command | Aliases | Effect |
          |---------|---------|--------|
          | `/accept` | `/true-positive`, `/tp` | Mark as a valid find — labels `accepted`, keeps issue open for ingestion |
          | `/false-positive [reason]` | `/fp` | Wrong report or unrelated result — labels `false-positive`, closes issue |
          | `/duplicate [reason]` | `/dup` | Already in repo or a duplicate discovery — labels `duplicate`, closes issue |
          | `/mismatch [reason]` | | Correct org but wrong year, edition, or category — labels `mismatch`, closes issue |
          | `/help` | | Show this message |

          All outcomes except `/accept` are fed into the discovery feedback learner to improve future searches.
          EOF
          )"

      - name: Ignore unknown commands
        if: steps.parse.outputs.valid == 'false'
        run: echo "Unknown command — ignoring."

      - name: Apply triage label
        if: steps.parse.outputs.valid == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LABEL="${{ steps.parse.outputs.label }}"

          # Ensure label exists (create it if not)
          gh label create "$LABEL" --color "$(case $LABEL in
            false-positive) echo 'b60205';;  # red
            duplicate)       echo 'cfd3d7';;  # grey
            mismatch)        echo 'd93f0b';;  # orange-red
            accepted)        echo '0e8a16';;  # green
            *)               echo 'e4e669';;
          esac)" --description "$(case $LABEL in
            false-positive) echo 'Discovery produced a wrong or unrelated result';;
            duplicate)      echo 'Already in repo or previously reviewed';;
            mismatch)       echo 'Correct org but wrong year/edition/category';;
            accepted)       echo 'Valid discovery — ready for ingestion';;
            *)              echo '';;
          esac)" 2>/dev/null || true

          # Remove existing outcome labels before applying the new one
          for old_label in false-positive duplicate mismatch accepted; do
            gh issue edit ${{ github.event.issue.number }} --remove-label "$old_label" 2>/dev/null || true
          done

          gh issue edit ${{ github.event.issue.number }} --add-label "$LABEL"

      - name: Post triage acknowledgement
        if: steps.parse.outputs.valid == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OUTCOME="${{ steps.parse.outputs.outcome }}"
          REASON="${{ steps.parse.outputs.reason }}"
          AUTHOR="${{ steps.parse.outputs.author }}"

          ICON=$(case $OUTCOME in
            true_positive)  echo "✅";;
            false_positive) echo "🚫";;
            duplicate)      echo "🔁";;
            mismatch)       echo "⚠️";;
          esac)

          MSG="$ICON **Triaged as \`$OUTCOME\`** by @$AUTHOR."
          [ -n "$REASON" ] && MSG="$MSG\n\n> $REASON"
          MSG="$MSG\n\n_This outcome will be incorporated into the next discovery feedback learner run to improve future searches._"

          gh issue comment ${{ github.event.issue.number }} --body "$(printf '%b' "$MSG")"

      - name: Close issue (negative outcomes)
        if: steps.parse.outputs.valid == 'true' && steps.parse.outputs.close == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue close ${{ github.event.issue.number }} \
            --reason "not planned" \
            --comment "" 2>/dev/null || \
          gh issue close ${{ github.event.issue.number }}

      - name: Record feedback event in artifact
        if: steps.parse.outputs.valid == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          OUTCOME: ${{ steps.parse.outputs.outcome }}
          REASON: ${{ steps.parse.outputs.reason }}
          AUTHOR: ${{ steps.parse.outputs.author }}
          ISSUE: ${{ steps.parse.outputs.issue }}
          ISSUE_TITLE: ${{ steps.parse.outputs.title }}
        run: |
          python - << 'PYEOF'
          import json, os, datetime, re, subprocess, sys

          feedback_path = ".github/artifacts/discovery-feedback.json"

          # ── Load existing feedback file ──────────────────────────────────
          try:
              with open(feedback_path, "r") as f:
                  data = json.load(f)
          except Exception as e:
              print(f"ERROR loading feedback file: {e}")
              sys.exit(1)

          # ── Parse issue metadata ─────────────────────────────────────────
          outcome      = os.environ.get("OUTCOME", "")
          reason       = os.environ.get("REASON", "")
          author       = os.environ.get("AUTHOR", "")
          issue_num    = os.environ.get("ISSUE", "")
          issue_title  = os.environ.get("ISSUE_TITLE", "")

          # Try to extract org + year from issue title
          # Expected format: "[Report Discovery] OrgName YYYY — Report Title"
          org, year, url, find_type, score = "", "", "", "", ""
          title_match = re.search(
              r"\[Report Discovery\]\s+(.+?)\s+(\d{4})\s+[—-]", issue_title
          )
          if title_match:
              org  = title_match.group(1).strip()
              year = title_match.group(2).strip()

          # Fetch issue body for URL / score / find_type via GH CLI
          try:
              result = subprocess.run(
                  ["gh", "issue", "view", issue_num, "--json", "body"],
                  capture_output=True, text=True, timeout=15
              )
              if result.returncode == 0:
                  body = json.loads(result.stdout).get("body", "")
                  url_match   = re.search(r"\*\*URL\*\*\s*\|\s*(https?://\S+)", body)
                  score_match = re.search(r"\*\*Heuristic Score\*\*\s*\|\s*(\d+)", body)
                  type_match  = re.search(
                      r"\*\*Type\*\*\s*\|\s*(?:📥|🔒|❓)\s*(Direct PDF|Gated Landing Page|Unclassified)",
                      body
                  )
                  if url_match:   url       = url_match.group(1).strip()
                  if score_match: score     = score_match.group(1).strip()
                  if type_match:  find_type = type_match.group(1).strip()
          except Exception:
              pass

          # ── Append to triage_log ─────────────────────────────────────────
          event = {
              "timestamp":   datetime.datetime.utcnow().isoformat() + "Z",
              "issue":       int(issue_num) if issue_num.isdigit() else issue_num,
              "title":       issue_title,
              "org":         org,
              "year":        year,
              "url":         url,
              "find_type":   find_type,
              "score":       score,
              "outcome":     outcome,
              "reason":      reason,
              "triaged_by":  author
          }
          data.setdefault("triage_log", []).append(event)

          # ── Update outcome counts ────────────────────────────────────────
          counts = data.setdefault("outcome_counts", {
              "true_positive": 0, "false_positive": 0,
              "duplicate": 0, "mismatch": 0
          })
          if outcome in counts:
              counts[outcome] += 1

          data["total_feedback_events"] = sum(counts.values())
          data["last_updated"] = datetime.datetime.utcnow().isoformat() + "Z"

          # ── Write back ───────────────────────────────────────────────────
          with open(feedback_path, "w") as f:
              json.dump(data, f, indent=2)

          print(f"✓ Feedback recorded: {outcome} for issue #{issue_num} ({org} {year})")
          print(f"  Total events: {data['total_feedback_events']}")
          PYEOF

      - name: Commit feedback update
        if: steps.parse.outputs.valid == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/artifacts/discovery-feedback.json
          git diff --cached --quiet || \
            git commit -m "chore: record triage feedback for issue #${{ github.event.issue.number }} [${{ steps.parse.outputs.outcome }}]"
          git push
