name: Issue Triage

on:
  issues:
    types: [edited]

permissions:
  issues: write
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  triage:
    runs-on: ubuntu-latest

    # Only run on edits by humans on automated discovery issues.
    # Discovery issues carry both 'automated' and 'report-suggestion' labels.
    if: |
      github.actor != 'github-actions[bot]' &&
      contains(github.event.issue.labels.*.name, 'automated') &&
      contains(github.event.issue.labels.*.name, 'report-suggestion')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Parse triage checkbox
        id: parse
        run: |
          # Fetch the raw issue body via the API (handles encoding properly)
          BODY=$(gh issue view "$ISSUE_NUMBER" --json body -q '.body')
          
          if echo "$BODY" | grep -qi '\[x\] \*\*Accept\*\*'; then
            OUTCOME="true_positive"
            LABEL="accepted"
            CLOSE="false"
          elif echo "$BODY" | grep -qi '\[x\] \*\*Duplicate\*\*'; then
            OUTCOME="duplicate"
            LABEL="duplicate"
            CLOSE="true"
          elif echo "$BODY" | grep -qi '\[x\] \*\*False Positive\*\*'; then
            OUTCOME="false_positive"
            LABEL="false-positive"
            CLOSE="true"
          elif echo "$BODY" | grep -qi '\[x\] \*\*Mismatch\*\*'; then
            OUTCOME="mismatch"
            LABEL="mismatch"
            CLOSE="true"
          else
            echo "valid=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          echo "valid=true" >> $GITHUB_OUTPUT
          echo "outcome=$OUTCOME" >> $GITHUB_OUTPUT
          echo "label=$LABEL" >> $GITHUB_OUTPUT
          echo "close=$CLOSE" >> $GITHUB_OUTPUT
          echo "author=$ISSUE_AUTHOR" >> $GITHUB_OUTPUT
          echo "issue=$ISSUE_NUMBER" >> $GITHUB_OUTPUT
          DELIM=$(uuidgen)
          {
            echo "title<<$DELIM"
            echo "$ISSUE_TITLE"
            echo "$DELIM"
          } >> "$GITHUB_OUTPUT"
          echo "reason=Triaged via issue checkbox" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_AUTHOR: ${{ github.actor }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}

      - name: Ignore unknown edits
        if: steps.parse.outputs.valid == 'false'
        run: echo "No triage checkboxes checked. Ignoring edit."

      - name: Apply triage label
        if: steps.parse.outputs.valid == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LABEL="${{ steps.parse.outputs.label }}"

          # Ensure label exists (create it if not)
          gh label create "$LABEL" --color "$(case $LABEL in
            false-positive) echo 'b60205';;  # red
            duplicate)       echo 'cfd3d7';;  # grey
            mismatch)        echo 'd93f0b';;  # orange-red
            accepted)        echo '0e8a16';;  # green
            *)               echo 'e4e669';;
          esac)" --description "$(case $LABEL in
            false-positive) echo 'Discovery produced a wrong or unrelated result';;
            duplicate)      echo 'Already in repo or previously reviewed';;
            mismatch)       echo 'Correct org but wrong year/edition/category';;
            accepted)       echo 'Valid discovery — ready for ingestion';;
            *)              echo '';;
          esac)" 2>/dev/null || true

          # Remove existing outcome labels before applying the new one
          for old_label in false-positive duplicate mismatch accepted; do
            gh issue edit "$ISSUE_NUMBER" --remove-label "$old_label" 2>/dev/null || true
          done

          gh issue edit "$ISSUE_NUMBER" --add-label "$LABEL"

      - name: Post triage acknowledgement
        if: steps.parse.outputs.valid == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          OUTCOME="${{ steps.parse.outputs.outcome }}"
          REASON="${{ steps.parse.outputs.reason }}"
          AUTHOR="${{ steps.parse.outputs.author }}"

          ICON=$(case $OUTCOME in
            true_positive)  echo "✅";;
            false_positive) echo "🚫";;
            duplicate)      echo "🔁";;
            mismatch)       echo "⚠️";;
          esac)

          MSG="$ICON **Triaged as \`$OUTCOME\`** by @$AUTHOR via checkbox."
          MSG="$MSG\n\n_This outcome will be incorporated into the next discovery feedback learner run to improve future searches._"

          gh issue comment "$ISSUE_NUMBER" --body "$(printf '%b' "$MSG")"

      - name: Close issue (negative outcomes)
        if: steps.parse.outputs.valid == 'true' && steps.parse.outputs.close == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh issue close "$ISSUE_NUMBER" \
            --reason "not planned" \
            --comment "" 2>/dev/null || \
          gh issue close "$ISSUE_NUMBER"

      - name: Record feedback event in artifact
        if: steps.parse.outputs.valid == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          OUTCOME: ${{ steps.parse.outputs.outcome }}
          REASON: ${{ steps.parse.outputs.reason }}
          AUTHOR: ${{ steps.parse.outputs.author }}
          ISSUE: ${{ steps.parse.outputs.issue }}
          ISSUE_TITLE: ${{ steps.parse.outputs.title }}
        run: |
          python - << 'PYEOF'
          import json, os, datetime, re, subprocess, sys

          feedback_path = ".github/artifacts/discovery-feedback.json"

          # ── Load existing feedback file ──────────────────────────────────
          try:
              with open(feedback_path, "r") as f:
                  data = json.load(f)
          except Exception as e:
              print(f"ERROR loading feedback file: {e}")
              sys.exit(1)

          if "feedback_events" not in data:
              data["feedback_events"] = []

          issue_title = os.environ.get("ISSUE_TITLE", "")
          # Extract org and URL from the issue body if possible
          org = ""
          url = ""
          try:
              issue_number = os.environ.get("ISSUE", "")
              body_output = subprocess.check_output(
                  ["gh", "issue", "view", issue_number, "--json", "body", "-q", ".body"],
                  text=True
              )
              # e.g., | **Organization** | Acme Corp |
              org_match = re.search(r"\|\s*\*\*Organization\*\*\s*\|\s*([^|]+?)\s*\|", body_output)
              if org_match: org = org_match.group(1).strip()
              
              url_match = re.search(r"\|\s*\*\*URL\*\*\s*\|\s*([^|]+?)\s*\|", body_output)
              if url_match: url = url_match.group(1).strip()
          except Exception as e:
              print(f"Could not extract org/url: {e}")

          event = {
              "timestamp": datetime.datetime.utcnow().isoformat() + "Z",
              "issue_number": int(os.environ.get("ISSUE", "0")),
              "issue_title": issue_title,
              "org": org,
              "url": url,
              "outcome": os.environ.get("OUTCOME", ""),
              "reason": os.environ.get("REASON", ""),
              "author": os.environ.get("AUTHOR", "")
          }

          data["feedback_events"].append(event)
          data["total_feedback_events"] = data.get("total_feedback_events", 0) + 1

          # Recompute outcome_counts
          counts = {"true_positive": 0, "false_positive": 0, "duplicate": 0, "mismatch": 0}
          for ev in data["feedback_events"]:
              o = ev.get("outcome")
              if o in counts: counts[o] += 1
          data["outcome_counts"] = counts

          try:
              with open(feedback_path, "w") as f:
                  json.dump(data, f, indent=2)
                  f.write("\n")
              print("✓ Feedback event recorded in discovery-feedback.json")
          except Exception as e:
              print(f"ERROR saving feedback file: {e}")
              sys.exit(1)
          PYEOF

      - name: Commit updated artifact
        if: steps.parse.outputs.valid == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/artifacts/discovery-feedback.json
          git diff --cached --quiet || \
            git commit -m "chore: record triage feedback for #${{ steps.parse.outputs.issue }}"
          git push || echo "Push failed (expected if another workflow committed concurrently)"
