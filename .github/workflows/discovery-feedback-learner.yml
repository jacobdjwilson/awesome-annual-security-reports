name: Discovery Feedback Learner

on:
  schedule:
    # Run every Monday at 7:00 AM ET (11:00 UTC) — after a week of triage activity
    - cron: '0 11 * * 1'

  # Also triggered automatically when the triage workflow closes enough issues:
  # The issue-triage workflow can dispatch this via repository_dispatch once
  # a configurable threshold is reached (optional enhancement).
  repository_dispatch:
    types: [run-feedback-learner]

  workflow_dispatch:
    inputs:
      min_events:
        description: 'Minimum feedback events before running Gemini (default: 5)'
        required: false
        default: '5'
        type: string
      dry_run:
        description: 'Dry run — analyse but do not write changes'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  learn:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --break-system-packages \
            google-genai \
            google-generativeai \
            google-ai-generativelanguage

      - name: Run feedback learner
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          ARGS="--artifacts-dir .github/artifacts"

          if [ -n "${{ github.event.inputs.min_events }}" ]; then
            ARGS="$ARGS --min-events ${{ github.event.inputs.min_events }}"
          fi

          if [ "${{ github.event.inputs.dry_run }}" == "true" ]; then
            ARGS="$ARGS --dry-run"
          fi

          python .github/scripts/discovery-feedback-learner.py $ARGS

      - name: Commit updated feedback file
        if: github.event.inputs.dry_run != 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/artifacts/discovery-feedback.json
          git diff --cached --quiet || \
            git commit -m "chore: update discovery scoring from feedback learner [$(date +%Y-%m-%d)]"
          git push

      - name: Generate step summary
        if: always()
        run: |
          FEEDBACK=".github/artifacts/discovery-feedback.json"
          if [ ! -f "$FEEDBACK" ]; then
            echo "⚠️ Feedback file not found." >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          TOTAL=$(jq -r '.total_feedback_events // 0' "$FEEDBACK")
          TP=$(jq -r '.outcome_counts.true_positive // 0' "$FEEDBACK")
          FP=$(jq -r '.outcome_counts.false_positive // 0' "$FEEDBACK")
          DUP=$(jq -r '.outcome_counts.duplicate // 0' "$FEEDBACK")
          MM=$(jq -r '.outcome_counts.mismatch // 0' "$FEEDBACK")
          SUMMARY=$(jq -r '.learned.summary // "(not yet run)"' "$FEEDBACK")
          LAST_RUN=$(jq -r '.last_learner_run // "never"' "$FEEDBACK")
          THRESH_DELTA=$(jq -r '.learned.score_threshold_delta // 0' "$FEEDBACK")
          BLOCK_COUNT=$(jq -r '.learned.domain_blocklist.domains | length' "$FEEDBACK" 2>/dev/null || echo 0)
          TRUST_COUNT=$(jq -r '.learned.domain_trustlist.domains | length' "$FEEDBACK" 2>/dev/null || echo 0)

          echo "## 🧠 Discovery Feedback Learner" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Last run | $LAST_RUN |" >> $GITHUB_STEP_SUMMARY
          echo "| Total feedback events | $TOTAL |" >> $GITHUB_STEP_SUMMARY
          echo "| ✅ True positives | $TP |" >> $GITHUB_STEP_SUMMARY
          echo "| 🚫 False positives | $FP |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔁 Duplicates | $DUP |" >> $GITHUB_STEP_SUMMARY
          echo "| ⚠️ Mismatches | $MM |" >> $GITHUB_STEP_SUMMARY
          echo "| Score threshold delta | $THRESH_DELTA |" >> $GITHUB_STEP_SUMMARY
          echo "| Domains blocked | $BLOCK_COUNT |" >> $GITHUB_STEP_SUMMARY
          echo "| Domains trusted | $TRUST_COUNT |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Gemini Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "$SUMMARY" >> $GITHUB_STEP_SUMMARY
