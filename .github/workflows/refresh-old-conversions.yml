name: Refresh Old Conversions

on:
  schedule:
    - cron: '0 11 * * *'  # 6:00 AM ET daily

  workflow_dispatch:
    inputs:
      limit:
        description: 'Number of files to refresh (default: 10)'
        required: false
        default: '10'
        type: string

      days_old:
        description: 'Minimum age in days (default: 90)'
        required: false
        default: '90'
        type: string

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  identify-stale-files:
    runs-on: ubuntu-latest
    outputs:
      has_files: ${{ steps.check-files.outputs.has_files }}
      file_count: ${{ steps.check-files.outputs.file_count }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Load workflow configuration
        id: load_config
        run: |
          DEFAULT_LIMIT=$(jq -r '.workflow.discovery.default_limit' .github/artifacts/workflow-config.json)
          MAX_OPEN_PRS=$(jq -r '.workflow.pull_request.max_open_automated_prs // 5' .github/artifacts/workflow-config.json)
          echo "default_limit=$DEFAULT_LIMIT" >> $GITHUB_OUTPUT
          echo "max_open_prs=$MAX_OPEN_PRS" >> $GITHUB_OUTPUT
          echo "✓ Default limit: $DEFAULT_LIMIT"
          echo "✓ Max open PRs : $MAX_OPEN_PRS"

      - name: Check existing refresh PR and PR cap
        id: check-pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MAX_OPEN_PRS="${{ steps.load_config.outputs.max_open_prs }}"

          # Check for an existing refresh PR specifically
          REFRESH_PR_COUNT=$(gh pr list \
            --state open \
            --label "maintenance" \
            --search "Refresh in:title" \
            --json number \
            -q length)

          if [ "${REFRESH_PR_COUNT:-0}" -gt 0 ]; then
            echo "⊘ Existing refresh PR found, skipping"
            echo "pr_exists=true" >> $GITHUB_OUTPUT
            echo "skip_reason=existing_refresh_pr" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Check the shared automated PR cap
          OPEN_COUNT=$(gh pr list \
            --state open \
            --label "automated" \
            --json number \
            -q length)

          echo "Open automated PRs: ${OPEN_COUNT} / ${MAX_OPEN_PRS}"

          if [ "${OPEN_COUNT:-0}" -ge "${MAX_OPEN_PRS}" ]; then
            echo "⊘ PR cap reached (${OPEN_COUNT} >= ${MAX_OPEN_PRS}) — skipping"
            echo "pr_exists=true" >> $GITHUB_OUTPUT
            echo "skip_reason=pr_cap_reached" >> $GITHUB_OUTPUT
            echo "open_count=$OPEN_COUNT" >> $GITHUB_OUTPUT
          else
            echo "✓ No existing PR found, cap OK (${OPEN_COUNT} < ${MAX_OPEN_PRS})"
            echo "pr_exists=false" >> $GITHUB_OUTPUT
            echo "skip_reason=" >> $GITHUB_OUTPUT
            echo "open_count=$OPEN_COUNT" >> $GITHUB_OUTPUT
          fi

      - name: Find stale files
        id: check-files
        if: steps.check-pr.outputs.pr_exists != 'true'
        run: |
          MD_ROOT="Markdown Conversions"
          PDF_ROOT="Annual Security Reports"

          LIMIT="${{ github.event.inputs.limit }}"
          DAYS_OLD="${{ github.event.inputs.days_old }}"

          if [ -z "$LIMIT" ]; then
            LIMIT="${{ steps.load_config.outputs.default_limit }}"
          fi
          if [ -z "$DAYS_OLD" ]; then
            DAYS_OLD=90
          fi

          THRESHOLD=$(date -d "$DAYS_OLD days ago" +%s)

          echo "Finding stale/missing conversions..."
          echo "  Limit: $LIMIT files"
          echo "  Min age: $DAYS_OLD days"

          > candidates.txt

          # Find missing conversions
          find "$PDF_ROOT" -name "*.pdf" | while read -r pdf; do
            rel_path="${pdf#$PDF_ROOT/}"
            md_path="$MD_ROOT/${rel_path%.pdf}.md"
            if [ ! -f "$md_path" ]; then
              echo "0 $pdf" >> candidates.txt
            fi
          done

          # Find stale conversions
          git ls-files -z "$MD_ROOT" | \
            xargs -0 -I {} git log -1 --format="%ct {}" -- {} | \
            while read -r timestamp file; do
              if [ "$timestamp" -lt "$THRESHOLD" ]; then
                rel_path="${file#$MD_ROOT/}"
                pdf_path="$PDF_ROOT/${rel_path%.md}.pdf"
                if [ -f "$pdf_path" ]; then
                  echo "$timestamp $pdf_path" >> candidates.txt
                fi
              fi
            done

          # Sort and limit
          sort -k1,1n candidates.txt | \
            cut -d' ' -f2- | \
            head -n "$LIMIT" > files_to_process.txt

          if [ -s files_to_process.txt ]; then
            COUNT=$(wc -l < files_to_process.txt | tr -d ' ')
            echo "has_files=true" >> $GITHUB_OUTPUT
            echo "file_count=$COUNT" >> $GITHUB_OUTPUT
            echo "✓ Found $COUNT files to refresh"
          else
            echo "has_files=false" >> $GITHUB_OUTPUT
            echo "file_count=0" >> $GITHUB_OUTPUT
            echo "⊘ No stale files found"
          fi

      - name: Upload file list
        if: |
          steps.check-pr.outputs.pr_exists != 'true' &&
          steps.check-files.outputs.has_files == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: files-to-process
          path: files_to_process.txt
          retention-days: 1

      - name: Generate discovery summary
        if: always()
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          PR_EXISTS="${{ steps.check-pr.outputs.pr_exists }}"
          SKIP_REASON="${{ steps.check-pr.outputs.skip_reason }}"
          OPEN_COUNT="${{ steps.check-pr.outputs.open_count }}"
          MAX_OPEN_PRS="${{ steps.load_config.outputs.max_open_prs }}"
          HAS_FILES="${{ steps.check-files.outputs.has_files }}"
          COUNT="${{ steps.check-files.outputs.file_count }}"

          echo "## ♻️ Refresh Old Conversions — Discovery" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Trigger | \`${{ github.event_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Limit | \`${{ github.event.inputs.limit || steps.load_config.outputs.default_limit }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Min Age (days) | \`${{ github.event.inputs.days_old || 90 }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Open Automated PRs | ${OPEN_COUNT:-?} / ${MAX_OPEN_PRS:-5} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "$PR_EXISTS" == "true" ]; then
            if [ "$SKIP_REASON" == "pr_cap_reached" ]; then
              echo "### ⏸️ PR Cap Reached" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "**${OPEN_COUNT} open automated PRs** — at or above the cap of **${MAX_OPEN_PRS}**." >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "Review and merge or close open automated PRs to unblock future refresh runs." >> $GITHUB_STEP_SUMMARY
            else
              echo "⊘ **Skipped** — An open refresh PR already exists." >> $GITHUB_STEP_SUMMARY
            fi
          elif [ "$HAS_FILES" == "true" ]; then
            echo "✅ Found **${COUNT}** file(s) to refresh. Processing job will follow." >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ No stale or missing conversions found — repository is up to date." >> $GITHUB_STEP_SUMMARY
          fi

  process-stale-reports:
    needs: identify-stale-files
    if: needs.identify-stale-files.outputs.has_files == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Load configuration and install dependencies
        run: |
          SYS_PACKAGES=$(jq -r '.workflow.conversion.system_packages | join(" ")' .github/artifacts/workflow-config.json)
          PY_PACKAGES=$(jq -r '.workflow.conversion.python_packages | join(" ")' .github/artifacts/workflow-config.json)

          echo "Installing system packages: $SYS_PACKAGES"
          sudo apt-get update
          sudo apt-get install -y $SYS_PACKAGES

          echo "Installing Python packages: $PY_PACKAGES"
          pip install --break-system-packages $PY_PACKAGES

      - name: Download file list
        uses: actions/download-artifact@v4
        with:
          name: files-to-process

      - name: Run PDF converter
        id: converter
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_SEARCH_API_KEY: ${{ secrets.GOOGLE_SEARCH_API_KEY }}
          GOOGLE_CSE_ID: ${{ secrets.GOOGLE_CSE_ID }}
        run: |
          # --force-reconvert bypasses the conversion cache and deletes the
          # existing markdown before reconverting, ensuring stale files are
          # regenerated at full quality rather than returned from cache.
          python .github/scripts/pdf-converter.py \
            --file-list files_to_process.txt \
            --output-json conversions.json \
            --artifacts-dir .github/artifacts \
            --force-reconvert

          SUCCESSFUL=$(jq '[.[] | select(.status == "success")] | length' conversions.json)
          FAILED=$(jq '[.[] | select(.status != "success")] | length' conversions.json)

          echo "successful_count=$SUCCESSFUL" >> $GITHUB_OUTPUT
          echo "failed_count=$FAILED" >> $GITHUB_OUTPUT

      - name: Run report analyzer
        id: analyzer
        if: success()
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          ERRORS_FILE=$(jq -r '.workflow.analysis.errors_output_file // "analysis_errors.json"' .github/artifacts/workflow-config.json)
          echo "errors_file=$ERRORS_FILE" >> $GITHUB_OUTPUT

          if [ -f conversions.json ]; then
            # set +e: prevent python's exit code 1 from killing the bash script
            # before outputs are written (same fix as in security-reports-pipeline.yml)
            set +e
            python .github/scripts/report-analyzer.py \
              conversions.json \
              --output-json analysis.json \
              --artifacts-dir .github/artifacts
            ANALYZER_EXIT=$?
            set -e

            ANALYSIS_COUNT=0
            ERROR_COUNT=0
            if [ -f analysis.json ] && jq empty analysis.json 2>/dev/null; then
              ANALYSIS_COUNT=$(jq 'length' analysis.json)
            fi
            if [ -f "$ERRORS_FILE" ] && jq empty "$ERRORS_FILE" 2>/dev/null; then
              ERROR_COUNT=$(jq 'length' "$ERRORS_FILE")
            fi

            echo "analysis_count=$ANALYSIS_COUNT" >> $GITHUB_OUTPUT
            echo "error_count=$ERROR_COUNT" >> $GITHUB_OUTPUT

            if [ "$ANALYSIS_COUNT" -gt 0 ]; then
              echo "analysis_success=true" >> $GITHUB_OUTPUT
              echo "✓ $ANALYSIS_COUNT report(s) analyzed successfully"
            else
              echo "analysis_success=false" >> $GITHUB_OUTPUT
              echo "❌ Analysis failed — $ERROR_COUNT report(s) could not be analyzed"
              if [ -f "$ERRORS_FILE" ] && [ "$ERROR_COUNT" -gt 0 ]; then
                echo "Error breakdown:"
                jq -r '.[] | "  [\(.error_type)] \(.organization) (\(.year)): \(.error[:120])"' "$ERRORS_FILE"
              fi
              exit 1
            fi
          fi

      - name: Update README
        id: readme_update
        if: success()
        run: |
          if [ -f analysis.json ]; then
            VALIDATE_TOC=$(jq -r '.workflow.validation.validate_toc' .github/artifacts/workflow-config.json)

            if [ "$VALIDATE_TOC" == "true" ]; then
              python .github/scripts/readme-updater.py \
                analysis.json \
                --readme-path README.md \
                --artifacts-dir .github/artifacts \
                --validate-toc
            else
              python .github/scripts/readme-updater.py \
                analysis.json \
                --readme-path README.md \
                --artifacts-dir .github/artifacts
            fi

            if git diff --quiet HEAD -- README.md "Markdown Conversions/"; then
              echo "changes_detected=false" >> $GITHUB_OUTPUT
              echo "⊘ No changes to commit"
            else
              echo "changes_detected=true" >> $GITHUB_OUTPUT
              echo "✓ Changes detected"
            fi
          fi

      - name: Create PR
        id: create_pr
        if: steps.readme_update.outputs.changes_detected == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "♻️ Refresh ${{ needs.identify-stale-files.outputs.file_count }} stale conversions"
          title: "♻️ Refresh ${{ needs.identify-stale-files.outputs.file_count }} Security Reports"
          body: |
            ## Automated Report Refresh

            Refreshed ${{ needs.identify-stale-files.outputs.file_count }} reports that were either:
            - Missing markdown conversions
            - Older than ${{ github.event.inputs.days_old || 90 }} days

            Markdown files were regenerated from scratch using the full
            markitdown + AI polish pipeline (identical to newly-added reports).

            **Run:** [#${{ github.run_id }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})

            ---
            *Auto-generated by Refresh Old Conversions workflow*
          branch: refresh-reports-${{ github.run_id }}
          delete-branch: true
          add-paths: |
            README.md
            Markdown Conversions/
          labels: |
            automated
            maintenance

      - name: Upload conversion results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: refresh-conversion-results
          path: |
            conversions.json
            analysis.json
            analysis_errors.json
            readme-update-results.json
          if-no-files-found: ignore

      - name: Generate processing summary
        if: always()
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          SUCCESSFUL="${{ steps.converter.outputs.successful_count }}"
          FAILED="${{ steps.converter.outputs.failed_count }}"
          PR_NUM="${{ steps.create_pr.outputs.pull-request-number }}"
          DAYS_OLD="${{ github.event.inputs.days_old || 90 }}"

          echo "## ♻️ Refresh Old Conversions — Processing" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Result | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Files Targeted | ${{ needs.identify-stale-files.outputs.file_count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ✅ Conversions Successful | ${SUCCESSFUL:-0} |" >> $GITHUB_STEP_SUMMARY
          echo "| ❌ Conversions Failed | ${FAILED:-0} |" >> $GITHUB_STEP_SUMMARY
          echo "| Min Age | ${DAYS_OLD} days |" >> $GITHUB_STEP_SUMMARY
          echo "| Conversion Method | markitdown + AI polish (force-reconvert) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.readme_update.outputs.changes_detected }}" == "true" ]; then
            if [ -n "$PR_NUM" ]; then
              PR_URL="https://github.com/${{ github.repository }}/pull/$PR_NUM"
              echo "✅ Pull request created: [PR #$PR_NUM]($PR_URL)" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "⊘ No README changes detected." >> $GITHUB_STEP_SUMMARY
          fi

          # Per-file conversion detail from conversions.json
          if [ -f conversions.json ] && [ "$(jq 'length' conversions.json)" -gt 0 ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 📄 Conversion Detail" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| File | Method | Model | Chars | Status |" >> $GITHUB_STEP_SUMMARY
            echo "|------|--------|-------|-------|--------|" >> $GITHUB_STEP_SUMMARY
            jq -r '.[] |
              "| `\(.pdf_path | split("/") | last)` | \(.method // "—") | \(.model // "—") | \(if .output_chars then (.output_chars | tostring) else "—" end) | \(if .status == "success" then "✅" else "❌ \(.message // "")" end) |"
            ' conversions.json >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          # Per-report README update results
          if [ -f readme-update-results.json ] && [ "$(jq 'length' readme-update-results.json 2>/dev/null || echo 0)" -gt 0 ]; then
            echo "### 📋 README Update Disposition" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Organization | Year | Action | Reason |" >> $GITHUB_STEP_SUMMARY
            echo "|--------------|------|--------|--------|" >> $GITHUB_STEP_SUMMARY
            jq -r '.[] |
              "| \(.organization) | \(.year) | \(if .status == "changed" then "✅ " + .action else "⊘ skipped" end) | \(.reason) |"
            ' readme-update-results.json >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          # Analysis results — show error details if analysis failed
          ANALYSIS_COUNT="${{ steps.analyzer.outputs.analysis_count }}"
          ANALYSIS_ERROR_COUNT="${{ steps.analyzer.outputs.error_count }}"
          ERRORS_FILE="${{ steps.analyzer.outputs.errors_file }}"
          ERRORS_FILE="${ERRORS_FILE:-analysis_errors.json}"

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🧠 Analysis Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${ANALYSIS_COUNT:-0}" -gt 0 ]; then
            echo "| ✅ Reports Analyzed | ❌ Analysis Failed |" >> $GITHUB_STEP_SUMMARY
            echo "|---|---|" >> $GITHUB_STEP_SUMMARY
            echo "| ${ANALYSIS_COUNT} | ${ANALYSIS_ERROR_COUNT:-0} |" >> $GITHUB_STEP_SUMMARY
          elif [ -f "$ERRORS_FILE" ] && [ "${ANALYSIS_ERROR_COUNT:-0}" -gt 0 ]; then
            echo "❌ **All report(s) failed AI analysis.**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Organization | Year | Error Type | Suggested Fix |" >> $GITHUB_STEP_SUMMARY
            echo "|---|---|---|---|" >> $GITHUB_STEP_SUMMARY
            jq -r '.[] |
              "| **\(.organization)** | \(.year) | `\(.error_type)` | \(.suggestion[:150] | gsub("\n";" ") | gsub("|";"\\|")) |"
            ' "$ERRORS_FILE" >> $GITHUB_STEP_SUMMARY
          else
            echo "⊘ No analysis was attempted or data is unavailable." >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📎 Full details available in [workflow artifacts]($RUN_URL)." >> $GITHUB_STEP_SUMMARY