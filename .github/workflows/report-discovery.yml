name: Security Report Discovery

on:
  schedule:
    - cron: '0 11 * * *'  # 6:00 AM ET daily

  workflow_dispatch:
    inputs:
      max_discoveries:
        description: 'Maximum number of new issues to create'
        required: false
        default: '10'
        type: string
      lookback_days:
        description: 'Days back to scan for closed feedback issues (Phase 1)'
        required: false
        default: '30'
        type: string
      skip_feedback:
        description: 'Skip Phase 1 feedback loop (useful for testing Phase 2/3 in isolation)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write   # needed to commit updated discovery_memory.json
  issues: write     # needed to create and read discovery issues

jobs:
  discover:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch full history so the memory commit doesn't conflict with
          # any concurrent runs that may have also updated the memory file.
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          # google-api-python-client and beautifulsoup4 are no longer needed —
          # the rewritten scripts use requests directly (same as google-search.py).
          pip install --break-system-packages requests

      - name: Load workflow configuration
        id: load_config
        run: |
          DEFAULT_LIMIT=$(jq -r '.workflow.discovery.default_limit' .github/artifacts/workflow-config.json)
          echo "default_limit=$DEFAULT_LIMIT" >> $GITHUB_OUTPUT

          MEMORY_FILE=".github/artifacts/discovery_memory.json"
          echo "memory_file=$MEMORY_FILE" >> $GITHUB_OUTPUT

          # Resolve inputs with fallback to config defaults
          MAX="${{ github.event.inputs.max_discoveries }}"
          LOOKBACK="${{ github.event.inputs.lookback_days }}"
          echo "max_discoveries=${MAX:-$DEFAULT_LIMIT}" >> $GITHUB_OUTPUT
          echo "lookback_days=${LOOKBACK:-30}" >> $GITHUB_OUTPUT

          echo "✓ Config loaded — limit: ${MAX:-$DEFAULT_LIMIT}, lookback: ${LOOKBACK:-30} days"

      # ── Phase 1: Feedback Loop ─────────────────────────────────────────
      # Reads closed 'report-discovery' issues, extracts rejection tags from
      # their closing comments, and updates .github/artifacts/discovery_memory.json.
      # Changes are committed back to the repo immediately so the file is
      # always current — even if Phase 2 crashes.

      - name: Phase 1 — Run feedback loop
        id: feedback
        if: github.event.inputs.skip_feedback != 'true'
        env:
          GH_TOKEN:            ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY:   ${{ github.repository }}
        run: |
          mkdir -p .github/data

          set +e
          python .github/scripts/discovery-feedback.py \
            --memory-file   "${{ steps.load_config.outputs.memory_file }}" \
            --artifacts-dir .github/artifacts \
            --lookback-days "${{ steps.load_config.outputs.lookback_days }}" \
            > feedback_output.log 2>&1
          FEEDBACK_EXIT=$?
          set -e

          cat feedback_output.log

          # Parse structured key=value lines printed by the script
          PROCESSED=$(grep  "^FEEDBACK_PROCESSED="   feedback_output.log | cut -d= -f2 || echo "0")
          ACCEPTED=$(grep   "^FEEDBACK_ACCEPTED="    feedback_output.log | cut -d= -f2 || echo "0")
          REJECTED=$(grep   "^FEEDBACK_REJECTED="    feedback_output.log | cut -d= -f2 || echo "0")
          DOMAINS=$(grep    "^FEEDBACK_DOMAIN_BLOCKS=" feedback_output.log | cut -d= -f2 || echo "0")
          KEYWORDS=$(grep   "^FEEDBACK_KEYWORDS="    feedback_output.log | cut -d= -f2 || echo "0")

          echo "feedback_processed=${PROCESSED:-0}"  >> $GITHUB_OUTPUT
          echo "feedback_accepted=${ACCEPTED:-0}"    >> $GITHUB_OUTPUT
          echo "feedback_rejected=${REJECTED:-0}"    >> $GITHUB_OUTPUT
          echo "feedback_domain_blocks=${DOMAINS:-0}" >> $GITHUB_OUTPUT
          echo "feedback_keywords=${KEYWORDS:-0}"    >> $GITHUB_OUTPUT

      - name: Phase 1 — Commit updated memory
        if: github.event.inputs.skip_feedback != 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          MEMORY_FILE="${{ steps.load_config.outputs.memory_file }}"

          if [ -f "$MEMORY_FILE" ] && ! git diff --quiet HEAD -- "$MEMORY_FILE"; then
            git add "$MEMORY_FILE"
            git commit -m "chore: update discovery_memory.json [skip ci]"
            git push
            echo "✓ Memory file committed and pushed"
          else
            echo "⊘ No memory changes to commit"
          fi

      # ── Phase 2 + 3: Discovery + Heuristic Validation ──────────────────
      # Searches for next-year versions of every report series that lacks one,
      # filters against the freshly-updated memory, scores each candidate, and
      # creates GitHub issues only for candidates above the score threshold.

      - name: Phase 2+3 — Run discovery
        id: discovery
        env:
          GOOGLE_SEARCH_API_KEY: ${{ secrets.GOOGLE_SEARCH_API_KEY }}
          GOOGLE_CSE_ID:         ${{ secrets.GOOGLE_CSE_ID }}
          GH_TOKEN:              ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY:     ${{ github.repository }}
        run: |
          set +e
          python .github/scripts/report-discovery.py \
            --artifacts-dir   .github/artifacts \
            --memory-file     "${{ steps.load_config.outputs.memory_file }}" \
            --max-discoveries "${{ steps.load_config.outputs.max_discoveries }}" \
            > discovery_output.log 2>&1
          DISCOVERY_EXIT=$?
          set -e

          cat discovery_output.log

          # Parse structured key=value lines printed by the script
          SEARCHED=$(grep    "^DISCOVERY_SEARCHED="         discovery_output.log | cut -d= -f2 || echo "0")
          MEM_FILT=$(grep    "^DISCOVERY_MEMORY_FILTERED="  discovery_output.log | cut -d= -f2 || echo "0")
          SUPPRESSED=$(grep  "^DISCOVERY_SCORE_SUPPRESSED=" discovery_output.log | cut -d= -f2 || echo "0")
          CREATED=$(grep     "^DISCOVERY_CREATED="          discovery_output.log | cut -d= -f2 || echo "0")
          SKIPPED=$(grep     "^DISCOVERY_SKIPPED="          discovery_output.log | cut -d= -f2 || echo "0")
          SKIPPED_REPO=$(grep "series skipped" discovery_output.log | grep -oP "\d+" | head -1 || echo "0")

          echo "discovery_searched=${SEARCHED:-0}"       >> $GITHUB_OUTPUT
          echo "discovery_mem_filtered=${MEM_FILT:-0}"   >> $GITHUB_OUTPUT
          echo "discovery_suppressed=${SUPPRESSED:-0}"   >> $GITHUB_OUTPUT
          echo "discovery_created=${CREATED:-0}"         >> $GITHUB_OUTPUT
          echo "discovery_skipped=${SKIPPED:-0}"         >> $GITHUB_OUTPUT
          echo "discovery_skipped_repo=${SKIPPED_REPO:-0}" >> $GITHUB_OUTPUT

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: discovery-logs-${{ github.run_id }}
          path: |
            feedback_output.log
            discovery_output.log
          if-no-files-found: ignore
          retention-days: 14

      - name: Generate step summary
        if: always()
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          SKIP_FB="${{ github.event.inputs.skip_feedback }}"

          echo "## 🔍 Security Report Discovery" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Trigger          | \`${{ github.event_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Max Discoveries  | \`${{ steps.load_config.outputs.max_discoveries }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Lookback (days)  | \`${{ steps.load_config.outputs.lookback_days }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # ── Phase 1 summary ──────────────────────────────────────────────
          if [ "$SKIP_FB" == "true" ]; then
            echo "### 🧠 Phase 1 — Feedback Loop" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⊘ Skipped (skip_feedback = true)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          else
            FB_PROCESSED="${{ steps.feedback.outputs.feedback_processed }}"
            FB_ACCEPTED="${{ steps.feedback.outputs.feedback_accepted }}"
            FB_REJECTED="${{ steps.feedback.outputs.feedback_rejected }}"
            FB_DOMAINS="${{ steps.feedback.outputs.feedback_domain_blocks }}"
            FB_KEYWORDS="${{ steps.feedback.outputs.feedback_keywords }}"

            echo "### 🧠 Phase 1 — Feedback Loop" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Issues Processed    | ${FB_PROCESSED:-0} |" >> $GITHUB_STEP_SUMMARY
            echo "| Accepted by Reviewer| ${FB_ACCEPTED:-0} |" >> $GITHUB_STEP_SUMMARY
            echo "| Rejected by Reviewer| ${FB_REJECTED:-0} |" >> $GITHUB_STEP_SUMMARY
            echo "| Domains Blocked     | ${FB_DOMAINS:-0} |" >> $GITHUB_STEP_SUMMARY
            echo "| Keywords Learned    | ${FB_KEYWORDS:-0} |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            if [ "${FB_DOMAINS:-0}" -gt 0 ] && [ -f feedback_output.log ]; then
              echo "**Newly blocked domains:**" >> $GITHUB_STEP_SUMMARY
              grep "Domain blocked:" feedback_output.log | sed 's/.*Domain blocked: /- `/' | sed 's/$/`/' >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
            fi

            if [ "${FB_KEYWORDS:-0}" -gt 0 ] && [ -f feedback_output.log ]; then
              echo "**Newly learned keywords:**" >> $GITHUB_STEP_SUMMARY
              grep "Keyword learned:" feedback_output.log | sed "s/.*Keyword learned: /- /" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
            fi
          fi

          # ── Phase 2+3 summary ─────────────────────────────────────────────
          D_SEARCHED="${{ steps.discovery.outputs.discovery_searched }}"
          D_REPO_SKIP="${{ steps.discovery.outputs.discovery_skipped_repo }}"
          D_MEM="${{ steps.discovery.outputs.discovery_mem_filtered }}"
          D_SUPP="${{ steps.discovery.outputs.discovery_suppressed }}"
          D_CREATED="${{ steps.discovery.outputs.discovery_created }}"
          D_SKIPPED="${{ steps.discovery.outputs.discovery_skipped }}"

          echo "### 🔭 Phase 2+3 — Discovery + Heuristic Validation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Series Skipped (next year in repo) | ${D_REPO_SKIP:-0} |" >> $GITHUB_STEP_SUMMARY
          echo "| Series Searched                    | ${D_SEARCHED:-0} |" >> $GITHUB_STEP_SUMMARY
          echo "| Filtered by Memory                 | ${D_MEM:-0} |" >> $GITHUB_STEP_SUMMARY
          echo "| Suppressed (below score threshold) | ${D_SUPP:-0} |" >> $GITHUB_STEP_SUMMARY
          echo "| Issues Created                     | **${D_CREATED:-0}** |" >> $GITHUB_STEP_SUMMARY
          echo "| Issues Skipped (already open)      | ${D_SKIPPED:-0} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${D_CREATED:-0}" -gt 0 ] && [ -f discovery_output.log ]; then
            echo "### ✅ New Reports Discovered" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            grep "✓ Created issue:" discovery_output.log | sed 's/.*Created issue: /- /' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          else
            echo "⊘ No new issues created this run." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            # Surface the reason when nothing was discovered
            if [ "${D_SUPP:-0}" -gt 0 ] && [ -f discovery_output.log ]; then
              echo "**Suppressed candidates (below score threshold):**" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              grep "Best score" discovery_output.log | sed 's/^  /- /' >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
            fi
          fi

          echo "📎 Full logs available in [workflow artifacts]($RUN_URL)." >> $GITHUB_STEP_SUMMARY